<!DOCTYPE html>
<html>

<head>

<title>History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1>Analysis History</h1>

<a href="/"
class="btn btn-primary mb-3">

New Analysis

</a>

<table class="table table-dark table-striped">

<thead>

<tr>

<th>ID</th>
<th>Filename</th>
<th>Risk Score</th>
<th>Severity</th>
<th>Date</th>

</tr>

</thead>

<tbody>

{% for report in reports %}

<tr>

<td>{{ report[0] }}</td>
<td>{{ report[1] }}</td>
<td>{{ report[2] }}</td>
<td>{{ report[3] }}</td>
<td>{{ report[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
